services:
  web:
    build: .
    image: ${APP_SLUG:-noonwake-test}:latest
    container_name: ${APP_SLUG:-noonwake-test}
    restart: unless-stopped
    environment:
      PORT: 8787
      LIFE_RPG_DATA_FILE: /app/runtime/state.json
    ports:
      - "127.0.0.1:${APP_PORT:-3001}:8787"
    volumes:
      - ./runtime:/app/runtime
