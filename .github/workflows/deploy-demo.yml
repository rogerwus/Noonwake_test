name: Deploy Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: demo-deploy-life-rpg
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - demo
      - ubuntu24
      - docker

    env:
      APP_SLUG: ${{ vars.APP_SLUG }}
      APP_PORT: ${{ vars.APP_PORT }}
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve config
        run: |
          echo "APP_SLUG=${APP_SLUG:-noonwake-test}" >> "$GITHUB_ENV"
          echo "APP_PORT=${APP_PORT:-3001}" >> "$GITHUB_ENV"
          echo "APP_DOMAIN=${APP_DOMAIN:-demo.noonwake.ai}" >> "$GITHUB_ENV"

      - name: Prepare app directory
        run: |
          sudo mkdir -p "/opt/demo-apps/$APP_SLUG/runtime"
          sudo chown -R deploy:deploy "/opt/demo-apps/$APP_SLUG"

      - name: Sync app files
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.tmp' \
            --exclude '.env' \
            --exclude 'backend/data/*.json' \
            --exclude 'runtime' \
            ./ "/opt/demo-apps/$APP_SLUG/"

      - name: Write runtime env
        run: |
          cat > "/opt/demo-apps/$APP_SLUG/.env" <<EOF
          APP_SLUG=$APP_SLUG
          APP_PORT=$APP_PORT
          APP_DOMAIN=$APP_DOMAIN
          EOF

      - name: Ensure runtime state
        run: |
          mkdir -p "/opt/demo-apps/$APP_SLUG/runtime"
          if [ ! -f "/opt/demo-apps/$APP_SLUG/runtime/state.json" ]; then
            printf '{\n  "players": {}\n}\n' > "/opt/demo-apps/$APP_SLUG/runtime/state.json"
          fi

      - name: Deploy
        run: |
          cd "/opt/demo-apps/$APP_SLUG"
          docker compose --env-file .env up -d --build --remove-orphans

      - name: Check container
        run: |
          docker ps --filter "name=$APP_SLUG"

      - name: Smoke test
        run: |
          curl -fsS "http://127.0.0.1:$APP_PORT/phase2/" > /dev/null
