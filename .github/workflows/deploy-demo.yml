name: Deploy Demo

on:
  push:
    branches:
      - main

concurrency:
  group: demo-deploy
  cancel-in-progress: true

env:
  APP_DIR: ${{ github.workspace }}/../demo-apps/noonwake-test

jobs:
  deploy:
    runs-on:
      - self-hosted
      - demo
      - ubuntu24
      - docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app directory
        run: |
          mkdir -p "$HOME/demo-apps/noonwake-test"
          rm -rf "$HOME/demo-apps/noonwake-test/site"

      - name: Copy files
        run: |
          cp docker-compose.yml "$HOME/demo-apps/noonwake-test/"
          cp -r site "$HOME/demo-apps/noonwake-test/"

      - name: Deploy
        run: |
          cd "$HOME/demo-apps/noonwake-test"
          docker compose up -d --remove-orphans

      - name: Check container
        run: |
          docker ps --filter name=noonwake-test

      - name: Smoke test
        run: |
          curl -fsS http://127.0.0.1:3001 > /dev/null
