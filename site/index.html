<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Noonwake Demo Template</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #cbd5e1;
      --accent: #4f8cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #15203d 0%, var(--bg) 55%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      padding: 36px;
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(79,140,255,0.16);
      color: #bcd2ff;
      font-size: 13px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 6vw, 52px);
      line-height: 1.05;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 28px;
    }
    .item {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
    }
    .item strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
    }
    code {
      color: #dbe8ff;
      background: rgba(255,255,255,0.08);
      padding: 2px 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Noonwake Demo Server</div>
    <h1>Auto deploy is working.</h1>
    <p>This page is served from the Noonwake demo server and deployed automatically from GitHub Actions.</p>
    <p>Current entrypoint: <code>demo.noonwake.ai</code></p>

    <section class="grid">
      <div class="item">
        <strong>Repo</strong>
        rogerwus/Noonwake_test
      </div>
      <div class="item">
        <strong>Runtime</strong>
        Docker + Nginx
      </div>
      <div class="item">
        <strong>Delivery</strong>
        GitHub Actions → self-hosted runner
      </div>
    </section>
  </main>
</body>
</html>
